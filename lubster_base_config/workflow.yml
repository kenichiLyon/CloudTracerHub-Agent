# workflow.yaml
# 工作方式与排障方法论

workflow:
  # 故障响应生命周期
  incident_lifecycle:
    detection:
      description: "多渠道感知异常"
      sources:
        - "告警风暴降噪（基于依赖拓扑的告警关联）"
        - "用户反馈聚类"
        - "自动化巡检异常"
      action: "自动生成 Incident Ticket，启动战争室 (War Room)"

    triage: # 分级
      criteria:
        P0: "核心交易链路中断/数据丢失风险/安全漏洞"
        P1: "核心功能降级/非核心链路中断"
        P2: "性能下降/非关键功能异常"
        P3: "轻微异常/优化建议"
      time_target:
        P0: "1 分钟内响应，15 分钟内止血"
        P1: "5 分钟内响应，30 分钟内恢复"
    
    containment: # 止血
      strategies:
        - "快速回滚（优先于根因定位）"
        - "流量切换（切空异常集群/机房）"
        - "限流降级（保护核心链路）"
        - "容量扩容（应对流量突增）"
      principle: "止损优先于完美，先活下来再优雅"

    diagnosis: # 诊断
      framework: "5-Layer Troubleshooting Model"
      layers:
        - layer: "现象层 (Symptom)"
          checks: "用户感知、业务指标、错误码分布"
          tools: "APM 仪表盘、业务监控大屏"
        
        - layer: "资源层 (Resource)"
          checks: "CPU/内存/磁盘/网络/文件描述符"
          tools: "Node Exporter, cAdvisor, kubectl top"
        
        - layer: "服务层 (Service)"
          checks: "Pod 状态、容器事件、进程健康、端口监听"
          tools: "kubectl describe, kubectl logs, crictl"
        
        - layer: "依赖层 (Dependency)"
          checks: "数据库、缓存、消息队列、外部 API"
          tools: "网络连通性测试、依赖服务指标、链路追踪"
        
        - layer: "变更层 (Change)"
          checks: "最近发布、配置变更、扩缩容、基础设施变更"
          tools: "Git 历史、ArgoCD 同步记录、云厂商操作日志"

    resolution: # 解决
      validation: "在预发环境复现，生产灰度验证"
      rollback_plan: "始终准备 Plan B，确保可回退"

    postmortem: # 复盘
      timeline: "故障结束后 24 小时内"
      output: "5 Whys 分析、Action Items、监控增强点、Runbook 更新"

  # 诊断工具箱
  diagnostic_toolkit:
    kubernetes_native:
      - command: "kubectl get events --sort-by='.lastTimestamp' | tail -50"
        purpose: "查看集群最近事件"
      - command: "kubectl describe pod <pod-name> -n <namespace>"
        purpose: "Pod 全生命周期事件"
      - command: "kubectl logs <pod-name> --previous"
        purpose: "获取崩溃前日志"
      - command: "kubectl debug node/<node-name> -it --image=nicolaka/netshoot"
        purpose: "节点网络诊断"
    
    observability_stack:
      metrics: "PromQL 查询模板、Grafana 仪表板链接"
      logs: "Loki/ES 查询语法、日志模式提取"
      traces: "Jaeger/Tempo 链路分析、关键 Span 识别"
      profiling: "Pyroscope/Parca 持续剖析、火焰图解读"
    
    network_advanced:
      - "tcpdump抓包分析（四元组过滤、包内容解码）"
      - "eBPF工具（bpftrace、kubectl trace）"
      - "mtr路径追踪、iperf带宽测试"
      - "Wireshark专家模式分析"
    
    custom_scripts:
      - "Pod资源使用排行榜（按namespace聚合）"
      - "异常事件关联分析（将Events与Metrics时间对齐）"
      - "网络策略连通性矩阵验证"

  # 知识管理
  knowledge_management:
    runbooks:
      structure: "症状->检查命令->判断标准->处置动作->验证方法"
      maintenance: "每次故障后更新，季度评审"
      storage: "Git 版本控制，与代码同生命周期"
    
    playbooks:
      - "数据库连接池耗尽"
      - "Redis大Key热Key"
      - "Kafka消费者滞后"
      - "K8s DNS解析异常"
      - "证书过期预警"
    
    sre_golden_signals:
      - "Latency（延迟）"
      - "Traffic（流量）"
      - "Errors（错误率）"
      - "Saturation（饱和度）"

  # 自动化原则
  automation_principles:
    toil_reduction: "将人工执行超过两次的操作脚本化"
    self_healing: "常见故障自动恢复（Pod 自动重启、节点自动隔离）"
    chatops: "通过 Slack/OpsGenie 直接执行诊断命令，结果自动回传"
    ai_assistance: "日志模式识别、异常预测、根因推荐"

  # 协作模式
  collaboration:
    escalation_path: "L1（值班 SRE）-> L2（领域专家）-> L3（架构师/厂商）"
    communication_channels:
      - "战争室（War Room）：实时语音+共享终端"
      - "事件频道（Incident Channel）：Slack/钉钉，所有日志集中"
      - "状态页（Status Page）：对外公告，每30分钟更新"
    
    stakeholder_management:
      tech_team: "技术细节、根因分析"
      business_team: "影响范围、预计恢复时间、业务损失评估"
      executives: "决策支持、资源申请、对外口径"